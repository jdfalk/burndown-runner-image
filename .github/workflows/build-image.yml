# file: .github/workflows/build-image.yml
# version: 2.0.1
# guid: f0c1ker0-0000-4000-8000-000000000003

name: Build image

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
  workflow_dispatch:

concurrency:
  group: build-image-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

jobs:
  release:
    name: Build + push image
    uses: jdfalk/ghcommon/.github/workflows/reusable-release.yml@c46f978c3de2ddc839f6e8e47c4a1739d932623e # latest
    with:
      release-type: 'auto'
      prerelease: true
      draft: false
      docker-enabled: true
      go-enabled: false
      python-enabled: false
      rust-enabled: false
      frontend-enabled: false
      protobuf-enabled: false
      build-target: 'docker'
    secrets: inherit
