# file: .github/workflows/release.yml
# version: 2.2.0
# guid: f0c1ker0-0000-4000-8000-000000000003

name: Build image

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch: {}

concurrency:
  group: build-image-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  actions: write
  checks: write
  packages: write
  id-token: write
  attestations: write

jobs:
  release:
    name: Build + push image
    uses: jdfalk/ghcommon/.github/workflows/reusable-release.yml@c46f978c3de2ddc839f6e8e47c4a1739d932623e # latest
    with:
      release-type: 'auto'
      prerelease: true
      draft: false
      docker-enabled: true
      build-target: 'docker'
    secrets: inherit
